cvm-version: 0.10.4
cpus: 16
memory: 16384
gpus: 0

models:
  - name: "privacy-filter"
    repo: "openai/privacy-filter@7ffa9a043d54d1be65afb281eddf0ffbe629385b"
    mpk: "d8de260d205c89df009794749bb1d463e06c8b560a989dc8999fc3f7a77a0cb9_17419419648_3892cd2f-a06e-5aee-8276-93140b9f06ec"

containers:
  - name: "privacy-filter"
    image: "ghcr.io/tinfoilsh/confidential-pii-cpu@sha256:9e0c73bb5690771fb81f552bf1f52b692584efc8bf383e2854a92002c63b775a" # v0.2.3
    restart: always
    env:
      - OPF_CHECKPOINT: "/tinfoil/mpk/mpk-d8de260d205c89df009794749bb1d463e06c8b560a989dc8999fc3f7a77a0cb9/original"
      - OPF_DEVICE: "cpu"
      - OPF_NUM_THREADS: "16"
      - OPF_MAX_CONCURRENCY: "1"
    tmpfs:
      /tmp: size=512m,mode=1777,exec
      /root: size=2g,mode=0700,exec
    command: ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8001"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m

shim:
  upstream-port: 8001
  authenticated: true
  authenticated-endpoints:
    - /redact
  paths:
    - /redact
    - /health
