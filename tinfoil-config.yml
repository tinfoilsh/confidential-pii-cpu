cvm-version: 0.10.4
cpus: 4
memory: 16384
gpus: 0

networks:
  app:
    egress: open  # huggingface.co model download on first boot

containers:
  - name: "privacy-filter"
    image: "ghcr.io/tinfoilsh/confidential-pii-cpu@sha256:dfeb651fd36c82c21afa03662cb6e72e8a204ce4fcf0de4cd2fd2c498821c8cd" # v0.1.2
    restart: always
    networks: ["app"]
    env:
      - HF_HOME: "/hf-cache"
      - OPF_CHECKPOINT: "/hf-cache/privacy-filter"
      - OPF_DEVICE: "cpu"
    volumes:
      - "hf-cache:/hf-cache"
    tmpfs:
      /tmp: size=512m,mode=1777,exec
      /root: size=2g,mode=0700,exec
    command: ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8001"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 15m  # cold model download on first boot

shim:
  upstream-port: 8001
  authenticated: true
  authenticated-endpoints:
    - /redact
  paths:
    - /redact
    - /health
